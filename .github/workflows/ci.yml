name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Audit dependencies
        # Temporarily non-blocking: npm retired the legacy audit API (HTTP 410
        # since 2026-07-15) and no released pnpm version uses the new bulk
        # advisory endpoint yet. Remove continue-on-error once the fix ships.
        # https://github.com/pnpm/pnpm/issues/11265
        continue-on-error: true
        run: pnpm audit --audit-level high
